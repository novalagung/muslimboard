name: CodeQL

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/codeql-analysis.yml"
      - "extension/**/*.js"
      - "webservice/**/*.go"
      - "webservice/go.mod"
      - "webservice/go.sum"
      - "website/**/*.js"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/codeql-analysis.yml"
      - "extension/**/*.js"
      - "webservice/**/*.go"
      - "webservice/go.mod"
      - "webservice/go.sum"
      - "website/**/*.js"
  schedule:
    - cron: "43 15 * * 2"
  workflow_dispatch:

jobs:
  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build
        working-directory: webservice
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  analyze-javascript:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v4
