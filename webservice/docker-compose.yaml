version: '3.9'

services:

  redis:
    restart: always
    container_name: muslimboard-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - volume-redis:/data
    networks:
      - muslimboard-network
    deploy:
      resources:
        limits:
          cpus: '0.30'
          # memory: 1000M

  webservice:
    restart: always
    container_name: muslimboard-api
    image: ghcr.io/novalagung/muslimboard-api:latest
    # build:
    #   context: ./
    #   dockerfile: ./Dockerfile
    env_file:
      - .env
    ports:
      - "8012:8012"
    networks:
      - muslimboard-network
    deploy:
      resources:
        limits:
          cpus: '0.60'
          memory: 300M

networks:
  muslimboard-network:

volumes:
  volume-redis:
